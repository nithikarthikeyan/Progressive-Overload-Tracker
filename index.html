<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Overload</title>
<meta name="theme-color" content="#14161A" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Overload" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%2314161A'/%3E%3Cg stroke='%23F2A93B' stroke-width='11' stroke-linecap='round' fill='none'%3E%3Cpath d='M55 60v60M40 72v36M125 60v60M140 72v36M55 90h70'/%3E%3C/g%3E%3C/svg%3E" />
<style>
  :root{--bg:#14161A;--panel:#1C1F24;--panel2:#23272E;--line:#31363F;--text:#ECECEA;--sub:#8A929E;--faint:#5C636E;--w:#F2A93B;--r:#5BA3C7;--s:#9B8CFF;--back:#E5604D;--hold:#8A929E;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:var(--bg);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input{font-size:16px;background:var(--bg);border:1px solid var(--line);border-radius:8px;color:var(--text);padding:9px 11px;outline:none;font-family:ui-monospace,monospace;}
  .wrap{max-width:560px;margin:0 auto;padding:max(18px,env(safe-area-inset-top)) 16px 60px;}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:14px;}
  .iconBtn{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:8px;display:grid;place-items:center;}
  .grid4{display:grid;grid-template-columns:repeat(4,1fr);gap:6px;}
  .dayBtn{padding:9px 0;border-radius:9px;font-size:13px;font-weight:700;border:1px solid var(--line);background:var(--panel);color:var(--sub);}
  .dayBtn.active{border-color:var(--w);background:rgba(242,169,59,.12);color:var(--w);}
  .exBtn{width:100%;text-align:left;padding:11px 12px;border-radius:9px;margin-bottom:2px;color:var(--sub);display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:500;}
  .exBtn.active{background:var(--panel2);color:var(--text);font-weight:700;}
  .exMeta{font-size:12px;color:var(--faint);font-family:ui-monospace,monospace;font-weight:400;}
  .chip{padding:5px 11px;border-radius:8px;font-size:12.5px;font-weight:700;border:1px solid var(--line);background:var(--panel2);color:var(--sub);}
  .chip.active{border-color:var(--w);background:rgba(242,169,59,.12);color:var(--w);}
  .tabBtn{flex:1;padding:9px 0;border-radius:9px;font-size:13px;font-weight:700;border:1px solid transparent;background:var(--panel);color:var(--sub);}
  .tabBtn.active{border-color:var(--line);background:var(--panel2);color:var(--text);}
  .feelBtn{text-align:left;padding:10px 12px;border-radius:9px;border:1px solid var(--line);background:var(--panel2);}
  .feelBtn.active{border-color:var(--w);background:rgba(242,169,59,.10);}
  .primary{width:100%;padding:13px 0;border-radius:10px;background:var(--w);color:#14161A;font-weight:800;font-size:15px;}
  .lbl{font-size:11px;color:var(--faint);margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;}
  .mono{font-family:ui-monospace,monospace;}
  .row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
var C={bg:"#14161A",panel:"#1C1F24",panel2:"#23272E",line:"#31363F",text:"#ECECEA",sub:"#8A929E",faint:"#5C636E",weight:"#F2A93B",reps:"#5BA3C7",set:"#9B8CFF",back:"#E5604D",hold:"#8A929E"};

var DEFAULTS=[
 {id:"ua1",day:"Upper A",name:"Barbell Bench Press",lo:5,hi:8,big:false},
 {id:"ua2",day:"Upper A",name:"Military Press (standing BB)",lo:5,hi:8,big:false},
 {id:"ua3",day:"Upper A",name:"Pull-up / Lat Pulldown",lo:6,hi:9,big:false},
 {id:"ua4",day:"Upper A",name:"Chest-Supported Row",lo:6,hi:9,big:false},
 {id:"ua5",day:"Upper A",name:"Cable Lateral Raise",lo:12,hi:15,big:false},
 {id:"ua6",day:"Upper A",name:"Triceps Pushdown",lo:8,hi:12,big:false},
 {id:"ua7",day:"Upper A",name:"Smith Machine Skullcrusher",lo:8,hi:10,big:false},
 {id:"ua8",day:"Upper A",name:"Barbell / DB Curl",lo:8,hi:12,big:false},
 {id:"la1",day:"Lower A",name:"Hack Squat or Belt Squat",lo:6,hi:9,big:false},
 {id:"la2",day:"Lower A",name:"Weighted Step-up",lo:8,hi:10,big:false},
 {id:"la3",day:"Lower A",name:"Lying Leg Curl",lo:8,hi:12,big:false},
 {id:"la4",day:"Lower A",name:"Leg Extension",lo:10,hi:15,big:false},
 {id:"la5",day:"Lower A",name:"Farmer's Carry",lo:30,hi:40,big:true,carry:true},
 {id:"la6",day:"Lower A",name:"Standing Calf Raise",lo:8,hi:12,big:false},
 {id:"ub1",day:"Upper B",name:"Incline DB Press",lo:6,hi:9,big:false},
 {id:"ub2",day:"Upper B",name:"Pec Deck / Cable Fly",lo:10,hi:15,big:false},
 {id:"ub3",day:"Upper B",name:"Seated DB Shoulder Press",lo:6,hi:9,big:false},
 {id:"ub4",day:"Upper B",name:"Wide-Grip Lat Pulldown",lo:8,hi:12,big:false},
 {id:"ub5",day:"Upper B",name:"DB Lateral Raise",lo:12,hi:15,big:false},
 {id:"ub6",day:"Upper B",name:"Overhead Triceps Extension",lo:10,hi:12,big:false},
 {id:"ub7",day:"Upper B",name:"Single-Arm Tricep Extension",lo:10,hi:12,big:false},
 {id:"ub8",day:"Upper B",name:"Incline DB Curl",lo:8,hi:12,big:false},
 {id:"lb1",day:"Lower B",name:"Romanian Deadlift",lo:6,hi:9,big:true},
 {id:"lb2",day:"Lower B",name:"Bulgarian Split Squat",lo:8,hi:12,big:false},
 {id:"lb3",day:"Lower B",name:"Seated Leg Curl",lo:8,hi:12,big:false},
 {id:"lb4",day:"Lower B",name:"Hip Thrust",lo:8,hi:12,big:true},
 {id:"lb5",day:"Lower B",name:"Seated Calf Raise",lo:10,hi:15,big:false}
];
var DAYS=["Upper A","Lower A","Upper B","Lower B"];
var FEELS=[{k:"easy",label:"Easy",hint:"3+ reps left in the tank"},{k:"solid",label:"Solid",hint:"hard but clean, 1-2 left"},{k:"hard",label:"Hard",hint:"all-out, hit the target"},{k:"grind",label:"Grind",hint:"ground to a halt / missed it"}];

function epley(w,r){return w*(1+r/30);}
function round(x,step){return Math.max(step,Math.round(x/step)*step);}
function increment(ex,feel,inc){var b=ex.big?inc*2:inc;if(feel==="easy")b*=2;if(feel==="grind")b=inc;return round(b,inc);}
function isStalled(rows){if(rows.length<3)return false;var l=rows.slice(-3);var sw=l.every(function(x){return x.weight===l[0].weight;});var best=l.map(function(x){return Math.max.apply(null,x.reps);});return sw&&best[2]<=best[0];}

function recommend(ex,rows,inc,unit){
 if(!rows.length)return{v:"START",c:C.sub,head:"Log your first set",sub:null,detail:"Once you log a session, your exact next-session target shows up here."};
 var last=rows[rows.length-1],w=last.weight,feel=last.feel;
 if(ex.carry){
  var dist=last.dist||ex.lo;
  if(last.beat)return{v:"RECOVER",c:C.hold,icon:"\u21BB",head:"Repeat "+w+unit,sub:"for "+dist+"m \u00B7 low recovery",detail:"You flagged low recovery -- repeat the same carry and add load next time you're fresh."};
  if(feel==="grind")return{v:"HOLD LOAD",c:C.back,icon:"\u26A0",head:"Hold "+w+unit,sub:"for "+dist+"m",detail:"Grip or posture broke down. Own "+w+unit+" for "+dist+"m clean before adding anything."};
  if(feel==="easy")return{v:"GO HEAVIER",c:C.weight,icon:"\u2191",head:(w+inc*2)+unit,sub:"or +10m \u00B7 too light",detail:"That barely registered -- jump to "+(w+inc*2)+unit+", or keep the load and walk 10m farther."};
  if(feel==="hard")return{v:"ADD DISTANCE",c:C.reps,icon:"\u2192",head:(dist+5)+"m",sub:"hold "+w+unit+" \u00B7 earn it",detail:"Load felt heavy -- keep "+w+unit+" and push to "+(dist+5)+"m. Add load once distance feels easy."};
  return{v:"GO HEAVIER",c:C.weight,icon:"\u2191",head:(w+inc)+unit,sub:"or extend to "+(dist+10)+"m",detail:"Solid carry. Add "+inc+unit+" next session, or keep the load and extend to "+(dist+10)+"m."};
 }
 var reps=last.reps,topHit=reps.every(function(r){return r>=ex.hi;}),bottomMiss=reps.some(function(r){return r<ex.lo;}),maxR=Math.max.apply(null,reps);
 if(last.beat)return{v:"RECOVER",c:C.hold,icon:"\u21BB",head:"Repeat "+w+unit,sub:"\u00D7 "+maxR+" \u00B7 low recovery",detail:"You flagged low recovery. Match "+w+" for "+ex.lo+"-"+ex.hi+" and push the weight next time you're fresh."};
 if(feel==="grind"&&bottomMiss){var under=ex.lo-Math.min.apply(null,reps);if(under>=2){var nw=round(w*0.9,inc);return{v:"BACK OFF",c:C.back,icon:"\u26A0",head:nw+unit,sub:"\u00D7 "+ex.lo+" \u00B7 backed off",detail:"You fell "+under+"+ reps short of "+ex.lo+". Reset to "+nw+" and rebuild clean reps before loading again."};}return{v:"HOLD WEIGHT",c:C.back,icon:"\u26A0",head:w+unit,sub:"\u00D7 "+ex.lo+" \u00B7 hold",detail:"You missed the bottom of the range. Repeat "+w+" until you hit "+ex.lo+"+ on every set."};}
 if(topHit){var add=increment(ex,feel,inc);return{v:"GO UP IN WEIGHT",c:C.weight,icon:"\u2191",head:(w+add)+unit,sub:"\u00D7 "+ex.lo+" \u00B7 +"+add,detail:"You capped "+ex.hi+" reps on every set. Add "+add+", drop to "+ex.lo+", and climb the range again."};}
 if(feel==="easy"){var add2=increment(ex,"easy",inc);return{v:"GO UP IN WEIGHT",c:C.weight,icon:"\u2191",head:(w+add2)+unit,sub:"+"+add2+" \u00B7 too light",detail:"That was too light -- you left 3+ in the tank. Jump to "+(w+add2)+" and keep working the "+ex.lo+"-"+ex.hi+" range."};}
 if(isStalled(rows)){var sets=last.reps.length;if(sets<4)return{v:"ADD A SET",c:C.set,icon:"\u2261",head:(sets+1)+" sets",sub:"@ "+w+unit,detail:"Reps & weight flat for 3 sessions. If sleep and soreness are good, add a set at "+w+". If you're run down, hold instead."};return{v:"HOLD",c:C.hold,icon:"\u21BB",head:"Hold "+w+unit,sub:"deload ~10% soon",detail:"You're at 4 sets and stalled -- take a lighter week (deload ~10%) then rebuild, rather than adding volume."};}
 var target=Math.min(maxR+1,ex.hi);
 return{v:"GO UP IN REPS",c:C.reps,icon:"\u21BB",head:w+unit+" \u00D7 "+target,sub:"same load \u00B7 +1 rep/set",detail:"Keep "+w+". Add one rep per set -- target "+target+" on every set. When all sets hit "+ex.hi+", the weight goes up."};
}

/* ---------- state + storage ---------- */
var KEY="po:data:v2";
function loadData(){try{var r=localStorage.getItem(KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function persist(){try{localStorage.setItem(KEY,JSON.stringify({logs:S.logs,custom:S.custom,unit:S.unit,inc:S.inc}));}catch(e){}}
var saved=loadData()||{};
var S={
 logs:saved.logs||[],custom:saved.custom||[],unit:saved.unit||"lb",inc:saved.inc||(saved.unit==="kg"?2.5:5),
 day:"Upper A",exId:"ua1",tab:"plan",showHow:false,showSet:false,showAdd:false,
 feel:"solid",beat:false,flash:false,
 form:{w:"",reps:["",""],dist:"30",trips:"3"},
 cForm:{name:"",lo:"8",hi:"12",big:false}
};
function uid(){return (window.crypto&&crypto.randomUUID)?crypto.randomUUID():"id"+Date.now()+Math.random();}
function esc(s){return String(s).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function exercises(){return DEFAULTS.concat(S.custom);}
function curEx(){var all=exercises();return all.filter(function(e){return e.id===S.exId;})[0]||all.filter(function(e){return e.day===S.day;})[0];}
function rowsFor(id){return S.logs.filter(function(l){return l.exId===id;}).sort(function(a,b){return a.t-b.t;});}

function miniChart(data,color){
 if(data.length<2)return '<div style="font-size:13px;color:'+C.faint+';padding:14px 0 18px">Log 2+ sessions to see your trend.</div>';
 var vals=data.map(function(d){return d.val;}),min=Math.min.apply(null,vals),max=Math.max.apply(null,vals),rng=(max-min)||1;
 var W=320,H=150,pad=22,pts=data.map(function(d,i){var x=pad+(i/(data.length-1))*(W-pad-8);var y=10+(1-(d.val-min)/rng)*(H-34);return [x,y];});
 var path=pts.map(function(p,i){return (i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1);}).join(" ");
 var grid=[0,0.5,1].map(function(g){var y=10+g*(H-34);return '<line x1="'+pad+'" x2="'+(W-8)+'" y1="'+y+'" y2="'+y+'" stroke="'+C.line+'" stroke-dasharray="3 3"/>';}).join("");
 var dots=pts.map(function(p){return '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="3" fill="'+color+'"/>';}).join("");
 return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px;margin-bottom:6px">'+grid+
  '<text x="'+pad+'" y="'+(H-6)+'" fill="'+C.faint+'" font-size="11">'+esc(data[0].d)+'</text>'+
  '<text x="'+(W-8)+'" y="'+(H-6)+'" fill="'+C.faint+'" font-size="11" text-anchor="end">'+esc(data[data.length-1].d)+'</text>'+
  '<text x="4" y="16" fill="'+C.faint+'" font-size="11">'+max+'</text>'+
  '<text x="4" y="'+(H-26)+'" fill="'+C.faint+'" font-size="11">'+min+'</text>'+
  '<path d="'+path+'" fill="none" stroke="'+color+'" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>'+dots+'</svg>';
}

function feelColor(f){return {easy:C.reps,solid:C.text,hard:C.weight,grind:C.back}[f]||C.sub;}

function render(){
 var ex=curEx(),all=exercises(),dayEx=all.filter(function(e){return e.day===S.day;});
 var rows=rowsFor(ex&&ex.id),rec=ex?recommend(ex,rows,S.inc,S.unit):null,lastLog=rows[rows.length-1];
 var chartData=rows.map(function(l){return {d:new Date(l.t).toLocaleDateString(undefined,{month:"numeric",day:"numeric"}),val:(ex&&ex.carry)?l.weight:Math.round(Math.max.apply(null,l.reps.map(function(r){return epley(l.weight,r);})))};});

 var H='<div class="wrap">';
 // header
 H+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><div style="display:flex;align-items:center;gap:10px"><div style="width:34px;height:34px;border-radius:9px;background:'+C.weight+';display:grid;place-items:center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#14161A" stroke-width="2.4" stroke-linecap="round"><path d="M6.5 6v12M3.2 8.5v7M17.5 6v12M20.8 8.5v7M6.5 12h11"/></svg></div><div><div style="font-weight:800;letter-spacing:-.02em;font-size:17px">OVERLOAD</div><div style="font-size:11px;color:'+C.faint+';letter-spacing:.14em;text-transform:uppercase">Upper / Lower tracker</div></div></div><button class="iconBtn" data-act="toggleSet"><span style="font-size:18px;color:'+C.sub+'">\u2699</span></button></div>';

 // settings
 if(S.showSet){
  H+='<div class="panel" style="padding:14px;margin-bottom:14px"><div class="row"><span style="font-size:13px;color:'+C.sub+'">Units</span><div style="display:flex;gap:6px">'+["lb","kg"].map(function(u){return '<button class="chip '+(S.unit===u?"active":"")+'" data-act="unit" data-val="'+u+'">'+u+'</button>';}).join("")+'</div></div><div class="row"><span style="font-size:13px;color:'+C.sub+'">Smallest plate jump</span><div style="display:flex;gap:6px">'+(S.unit==="kg"?[1.25,2.5,5]:[2.5,5,10]).map(function(n){return '<button class="chip '+(S.inc===n?"active":"")+'" data-act="inc" data-val="'+n+'">'+n+'</button>';}).join("")+'</div></div><div style="font-size:12px;color:'+C.faint+';margin-top:4px">Weight jumps round to this. Big lifts (RDL, hip thrust, carries) jump double.</div><div style="border-top:1px solid '+C.line+';margin:12px 0 10px"></div><div class="lbl">Backup \u00B7 '+S.logs.length+' sessions</div><div style="display:flex;gap:8px"><button data-act="export" style="flex:1;padding:9px 0;border-radius:9px;border:1px solid '+C.line+';background:'+C.panel2+';color:'+C.text+';font-size:13px;font-weight:700">Export backup</button><button data-act="import" style="flex:1;padding:9px 0;border-radius:9px;border:1px solid '+C.line+';background:'+C.panel2+';color:'+C.text+';font-size:13px;font-weight:700">Import backup</button></div><div style="font-size:12px;color:'+C.faint+';margin-top:8px">Export saves your full log as a file you can keep anywhere. Import merges a backup back in \u2014 nothing gets overwritten.</div></div>';
 }

 // day selector
 H+='<div class="grid4" style="margin-bottom:12px">'+DAYS.map(function(d){return '<button class="dayBtn '+(S.day===d?"active":"")+'" data-act="pickDay" data-val="'+d+'">'+d+'</button>';}).join("")+'</div>';

 // exercise selector
 H+='<div class="panel" style="padding:6px;margin-bottom:14px">'+dayEx.map(function(e){return '<button class="exBtn '+(e.id===S.exId?"active":"")+'" data-act="selEx" data-val="'+e.id+'"><span>'+esc(e.name)+'</span><span class="exMeta">'+(e.carry?e.lo+"-"+e.hi+"m":e.lo+"-"+e.hi)+'</span></button>';}).join("");
 H+='<button data-act="toggleAdd" style="width:100%;padding:9px 12px;border-radius:9px;color:'+C.faint+';font-size:13px;display:flex;align-items:center;gap:6px">+ Add exercise to '+S.day+'</button>';
 if(S.showAdd){
  H+='<div style="padding:10px;border-top:1px solid '+C.line+';margin-top:4px"><input data-field="cname" placeholder="Exercise name" value="'+esc(S.cForm.name)+'" style="width:100%"><div style="display:flex;gap:8px;margin-top:8px;align-items:center"><input data-field="clo" inputmode="numeric" value="'+esc(S.cForm.lo)+'" style="width:56px"><span style="color:'+C.faint+'">to</span><input data-field="chi" inputmode="numeric" value="'+esc(S.cForm.hi)+'" style="width:56px"><span style="color:'+C.sub+';font-size:13px">reps</span><button class="chip '+(S.cForm.big?"active":"")+'" data-act="cBig">big lift</button></div><button class="primary" data-act="addCustom" style="margin-top:10px">Add</button></div>';
 }
 H+='</div>';

 // recommendation
 if(rec){
  var lastLine="";
  if(lastLog){lastLine=lastLog.carry?("Last: "+lastLog.weight+S.unit+" \u00D7 "+lastLog.dist+"m \u00D7 "+lastLog.trips+" trips \u00B7 felt "+lastLog.feel+(lastLog.beat?" \u00B7 low recovery":"")):("Last: "+lastLog.weight+S.unit+" \u00D7 "+lastLog.reps.join(", ")+" \u00B7 felt "+lastLog.feel+(lastLog.beat?" \u00B7 low recovery":"")+" \u00B7 est 1RM "+Math.round(Math.max.apply(null,lastLog.reps.map(function(r){return epley(lastLog.weight,r);})))+S.unit);}
  H+='<div class="panel" style="padding:18px;margin-bottom:14px;border-color:'+rec.c+';box-shadow:0 0 0 1px '+rec.c+'22"><div style="display:flex;align-items:center;gap:8px;margin-bottom:10px"><span style="font-size:16px;font-weight:700;color:'+rec.c+'">'+(rec.icon||"\u26A1")+'</span><span style="font-size:12px;font-weight:800;letter-spacing:.12em;color:'+rec.c+'">'+rec.v+'</span></div><div style="font-size:36px;font-weight:800;letter-spacing:-.03em;line-height:1.05">'+esc(rec.head)+'</div>'+(rec.sub?'<div class="mono" style="font-size:13px;color:'+C.sub+';margin-top:5px">'+esc(rec.sub)+'</div>':"")+'<div style="font-size:13.5px;color:'+C.sub+';line-height:1.5;margin-top:10px">'+esc(rec.detail)+'</div>'+(lastLog?'<div class="mono" style="margin-top:12px;padding-top:12px;border-top:1px solid '+C.line+';font-size:12px;color:'+C.faint+'">'+esc(lastLine)+'</div>':"")+'</div>';
 }

 // tabs
 H+='<div style="display:flex;gap:6px;margin-bottom:12px">'+[["plan","Log set"],["history","Progress"]].map(function(t){return '<button class="tabBtn '+(S.tab===t[0]?"active":"")+'" data-act="tab" data-val="'+t[0]+'">'+t[1]+'</button>';}).join("")+'</div>';

 if(S.tab==="plan"){
  H+='<div class="panel" style="padding:16px"><div style="font-size:13px;font-weight:700;color:'+C.sub+';margin-bottom:10px">'+esc(ex?ex.name:"")+'</div>';
  if(ex&&ex.carry){
   H+='<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap"><div><div class="lbl">Load ('+S.unit+', total)</div><input data-field="w" inputmode="decimal" placeholder="0" value="'+esc(S.form.w)+'" style="width:90px;font-size:18px"></div><div><div class="lbl">Distance (m)</div><input data-field="dist" inputmode="numeric" value="'+esc(S.form.dist)+'" style="width:70px;font-size:18px"></div><div><div class="lbl">Trips</div><input data-field="trips" inputmode="numeric" value="'+esc(S.form.trips)+'" style="width:60px;font-size:18px"></div></div>';
  }else{
   H+='<div style="display:flex;gap:10px;margin-bottom:14px;align-items:flex-end;flex-wrap:wrap"><div><div class="lbl">Weight ('+S.unit+')</div><input data-field="w" inputmode="decimal" placeholder="0" value="'+esc(S.form.w)+'" style="width:90px;font-size:18px"></div><div><div class="lbl">Reps per set</div><div style="display:flex;gap:6px;flex-wrap:wrap">'+S.form.reps.map(function(r,i){return '<input data-field="reps" data-idx="'+i+'" inputmode="numeric" placeholder="S'+(i+1)+'" value="'+esc(r)+'" style="width:52px;font-size:18px;text-align:center">';}).join("")+'<button class="iconBtn" data-act="addSet"><span style="color:'+C.sub+';font-size:16px">+</span></button>'+(S.form.reps.length>1?'<button class="iconBtn" data-act="rmSet"><span style="color:'+C.sub+';font-size:16px">\u2212</span></button>':"")+'</div></div></div>';
  }
  H+='<div class="lbl">'+((ex&&ex.carry)?"How did the carry feel?":"How did the hardest set feel?")+'</div><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:6px">'+FEELS.map(function(f){return '<button class="feelBtn '+(S.feel===f.k?"active":"")+'" data-act="feel" data-val="'+f.k+'"><div style="font-weight:700;font-size:13.5px;color:'+(S.feel===f.k?C.weight:C.text)+'">'+f.label+'</div><div style="font-size:11px;color:'+C.faint+';margin-top:2px">'+f.hint+'</div></button>';}).join("")+'</div>';
  H+='<button data-act="toggleBeat" style="display:flex;align-items:center;gap:8px;width:100%;padding:10px 12px;margin-top:4px;border-radius:9px;border:1px solid '+(S.beat?C.back:C.line)+';background:'+(S.beat?"rgba(229,96,77,.10)":C.panel2)+';color:'+(S.beat?C.back:C.sub)+';font-size:13px"><span style="width:16px;height:16px;border-radius:4px;border:1px solid '+(S.beat?C.back:C.faint)+';display:grid;place-items:center;color:'+C.back+';font-size:12px">'+(S.beat?"\u2713":"")+'</span>Under-recovered today (bad sleep / still sore)</button>';
  H+='<button class="primary" data-act="log" style="margin-top:14px;background:'+(S.flash?C.reps:C.weight)+'">'+(S.flash?"Logged \u2713":"Log this session")+'</button></div>';
 }

 if(S.tab==="history"){
  H+='<div class="panel" style="padding:16px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:12px"><span style="color:'+C.weight+';font-size:15px">\u2197</span><span style="font-size:13px;font-weight:700">'+((ex&&ex.carry)?"Load trend":"Estimated 1RM trend")+' -- '+esc(ex?ex.name:"")+'</span></div>'+miniChart(chartData,C.weight);
  H+='<div style="font-size:12px;font-weight:700;color:'+C.sub+';margin:10px 0 8px">Session log</div>';
  if(!rows.length)H+='<div style="font-size:13px;color:'+C.faint+'">No sessions yet.</div>';
  H+=rows.slice().reverse().map(function(l){return '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:1px solid '+C.line+'"><div class="mono" style="font-size:13px"><span style="color:'+C.text+';font-weight:700">'+l.weight+S.unit+'</span><span style="color:'+C.sub+'"> '+(l.carry?"\u00D7 "+l.dist+"m \u00D7 "+l.trips:"\u00D7 "+l.reps.join(", "))+'</span></div><div style="display:flex;align-items:center;gap:10px"><span style="font-size:11px;color:'+feelColor(l.feel)+';text-transform:uppercase;letter-spacing:.08em">'+l.feel+'</span><span style="font-size:11px;color:'+C.faint+'">'+new Date(l.t).toLocaleDateString(undefined,{month:"short",day:"numeric"})+'</span><button class="iconBtn" style="padding:4px" data-act="del" data-val="'+l.id+'"><span style="color:'+C.faint+';font-size:13px">\u2212</span></button></div></div>';}).join("");
  H+='</div>';
 }

 // how it works
 H+='<button data-act="toggleHow" style="width:100%;margin-top:14px;padding:12px 14px;border-radius:12px;border:1px solid '+C.line+';background:'+C.panel+';color:'+C.sub+';font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center">How the recommendations work <span style="font-size:16px;display:inline-block;transform:'+(S.showHow?"rotate(180deg)":"none")+'">\u2304</span></button>';
 if(S.showHow){
  function lever(c,ch,t,b){return '<div style="display:flex;gap:11px;margin-bottom:14px"><div style="width:26px;height:26px;border-radius:7px;background:'+c+'1f;display:grid;place-items:center;flex-shrink:0;color:'+c+';font-size:15px;font-weight:700">'+ch+'</div><div><div style="font-weight:700;font-size:13.5px;color:'+c+';margin-bottom:2px">'+t+'</div><div style="font-size:12.5px;color:'+C.sub+';line-height:1.5">'+b+'</div></div></div>';}
  H+='<div class="panel" style="padding:16px;margin-top:8px">'+lever(C.reps,"\u21BB","Reps first","Below the top of your range? Add one rep per set, same weight. Default move -- climb reps before load.")+lever(C.weight,"\u2191","Then weight","Hit the top of the range on every set (or it felt easy)? Load goes up -- "+(S.unit==="kg"?"2.5":"5")+S.unit+" on most lifts, double on big lifts, double again if it felt easy. Then reset to the bottom of the range.")+lever(C.set,"\u2261","Sets only when stalled","Reps and weight flat 3 sessions and recovering well? Add one set (capped at 4) to break the plateau -- not every week.")+lever(C.back,"\u26A0","Back off when needed","Ground out below your range, hold or drop ~10%. Flag low recovery and it tells you to repeat, not push.")+lever(C.reps,"\u2192","Carries progress differently","Farmer's carries aren't rep-based -- you log load, distance, and trips, and progress by adding weight or walking farther.")+'<div style="font-size:11.5px;color:'+C.faint+';margin-top:4px;line-height:1.5">"Est 1RM" uses Epley (weight x (1 + reps/30)) to track strength across rep counts. It\u0027s for trend-watching, not a max to attempt.</div></div>';
 }
 H+='<div style="text-align:center;font-size:11px;color:'+C.faint+';margin-top:20px">Saves to this device automatically.</div></div>';

 root.innerHTML=H;
}

function setFirstExForDay(){var f=exercises().filter(function(e){return e.day===S.day;})[0];if(f)S.exId=f.id;}

function onClick(e){
 var el=e.target.closest("[data-act]");if(!el)return;
 var act=el.getAttribute("data-act"),val=el.getAttribute("data-val");
 if(act==="toggleSet")S.showSet=!S.showSet;
 else if(act==="toggleAdd")S.showAdd=!S.showAdd;
 else if(act==="toggleHow")S.showHow=!S.showHow;
 else if(act==="pickDay"){S.day=val;setFirstExForDay();S.showSet=false;}
 else if(act==="selEx")S.exId=val;
 else if(act==="tab")S.tab=val;
 else if(act==="feel")S.feel=val;
 else if(act==="toggleBeat")S.beat=!S.beat;
 else if(act==="addSet")S.form.reps.push("");
 else if(act==="rmSet"){if(S.form.reps.length>1)S.form.reps.pop();}
 else if(act==="unit"){S.unit=val;S.inc=val==="kg"?2.5:5;persist();}
 else if(act==="inc"){S.inc=parseFloat(val);persist();}
 else if(act==="cBig")S.cForm.big=!S.cForm.big;
 else if(act==="addCustom"){if(!S.cForm.name.trim())return;var id="c"+uid().slice(0,6);S.custom.push({id:id,day:S.day,name:S.cForm.name.trim(),lo:parseInt(S.cForm.lo)||8,hi:parseInt(S.cForm.hi)||12,big:S.cForm.big});S.cForm={name:"",lo:"8",hi:"12",big:false};S.showAdd=false;S.exId=id;persist();}
 else if(act==="del"){S.logs=S.logs.filter(function(x){return x.id!==val;});persist();}
 else if(act==="export"){doExport();return;}
 else if(act==="import"){fileInput.click();return;}
 else if(act==="log"){doLog();return;}
 render();
}
function doLog(){
 var ex=curEx(),weight=parseFloat(S.form.w);if(!weight||weight<=0)return;
 if(ex.carry){var dist=parseInt(S.form.dist,10),trips=parseInt(S.form.trips,10);if(!dist||!trips)return;S.logs.push({id:uid(),exId:ex.id,t:Date.now(),weight:weight,dist:dist,trips:trips,feel:S.feel,beat:S.beat,carry:true});}
 else{var reps=S.form.reps.map(function(r){return parseInt(r,10);}).filter(function(n){return n>0;});if(!reps.length)return;S.logs.push({id:uid(),exId:ex.id,t:Date.now(),weight:weight,reps:reps,feel:S.feel,beat:S.beat});S.form.reps=S.form.reps.map(function(){return "";});}
 persist();S.beat=false;S.flash=true;render();setTimeout(function(){S.flash=false;render();},1400);
}
function doExport(){
 try{var data=JSON.stringify({app:"overload",exported:new Date().toISOString(),logs:S.logs,custom:S.custom,unit:S.unit,inc:S.inc},null,2);
 var blob=new Blob([data],{type:"application/json"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="overload-backup-"+new Date().toISOString().slice(0,10)+".json";document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(url);},2000);}catch(e){alert("Export isn't supported in this browser.");}
}
function doImport(file){
 var reader=new FileReader();
 reader.onload=function(){try{var d=JSON.parse(reader.result);if(!d||!Array.isArray(d.logs))throw 0;
  var seen={},merged=[];S.logs.concat(d.logs).forEach(function(l){if(l&&l.id&&!seen[l.id]){seen[l.id]=1;merged.push(l);}});S.logs=merged;
  if(Array.isArray(d.custom)){var cs={},cm=[];S.custom.concat(d.custom).forEach(function(c){if(c&&c.id&&!cs[c.id]){cs[c.id]=1;cm.push(c);}});S.custom=cm;}
  if(d.unit)S.unit=d.unit;if(d.inc)S.inc=d.inc;
  persist();render();alert("Backup imported \u2014 "+S.logs.length+" sessions total.");
 }catch(e){alert("Couldn't read that file. Make sure it's an Overload backup .json.");}};
 reader.readAsText(file);
}
var fileInput=document.createElement("input");fileInput.type="file";fileInput.accept="application/json,.json";fileInput.style.display="none";fileInput.addEventListener("change",function(e){var f=e.target.files&&e.target.files[0];if(f)doImport(f);fileInput.value="";});document.body.appendChild(fileInput);
function onInput(e){
 var el=e.target,f=el.getAttribute("data-field");if(!f)return;
 if(f==="w")S.form.w=el.value;
 else if(f==="dist")S.form.dist=el.value;
 else if(f==="trips")S.form.trips=el.value;
 else if(f==="reps")S.form.reps[parseInt(el.getAttribute("data-idx"),10)]=el.value;
 else if(f==="cname")S.cForm.name=el.value;
 else if(f==="clo")S.cForm.lo=el.value;
 else if(f==="chi")S.cForm.hi=el.value;
}
var root=document.getElementById("root");
root.addEventListener("click",onClick);
root.addEventListener("input",onInput);
render();
</script>
</body>
