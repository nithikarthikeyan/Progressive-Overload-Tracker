<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>Overload</title>
<meta name="theme-color" content="#FAFBFD" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="default" />
<meta name="apple-mobile-web-app-title" content="Overload" />
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%23181A20'/%3E%3Cg stroke='%23FFFFFF' stroke-width='11' stroke-linecap='round' fill='none'%3E%3Cpath d='M55 60v60M40 72v36M125 60v60M140 72v36M55 90h70'/%3E%3C/g%3E%3C/svg%3E" />
<style>
  :root{--bg:#FAFBFD;--panel:#FFFFFF;--panel2:#F4F5F9;--line:#ECEDF3;--text:#181A20;--sub:#6A6F7C;--faint:#A2A6B2;--w:#181A20;--r:#2C7BC0;--s:#6A55C0;--back:#D2566B;--hold:#7A7F8C;}
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;background:#FAFBFD;color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,'Segoe UI',Roboto;}
  button{font-family:inherit;cursor:pointer;border:none;background:none;color:inherit;}
  input{font-size:16px;background:var(--panel2);border:1px solid var(--line);border-radius:11px;color:var(--text);padding:10px 12px;outline:none;font-family:ui-monospace,monospace;}
  input:focus{border-color:var(--w);}
  .wrap{max-width:560px;margin:0 auto;padding:max(18px,env(safe-area-inset-top)) 16px 60px;}
  .panel{background:var(--panel);border:1px solid var(--line);border-radius:22px;box-shadow:0 8px 22px rgba(24,26,32,0.05);}
  .iconBtn{background:var(--panel2);border:1px solid var(--line);border-radius:12px;padding:8px;display:grid;place-items:center;}
  .dayBtn{padding:11px 0;border-radius:14px;font-size:13px;font-weight:700;border:1px solid var(--line);background:var(--panel);color:var(--sub);}
  .dayBtn.active{background:var(--w);color:#fff;border-color:var(--w);box-shadow:0 8px 18px rgba(24,26,32,0.28);}
  .exBtn{width:100%;text-align:left;padding:12px 13px;border-radius:14px;margin-bottom:2px;color:var(--sub);display:flex;justify-content:space-between;align-items:center;font-size:14px;font-weight:500;}
  .exBtn.active{background:rgba(24,26,32,0.05);color:var(--text);font-weight:700;}
  .exMeta{font-size:12px;color:var(--faint);font-family:ui-monospace,monospace;font-weight:400;}
  .chip{padding:6px 12px;border-radius:11px;font-size:12.5px;font-weight:700;border:1px solid var(--line);background:var(--panel2);color:var(--sub);}
  .chip.active{border-color:var(--w);background:rgba(24,26,32,0.06);color:var(--text);}
  .tabBtn{flex:1;padding:11px 0;border-radius:14px;font-size:13px;font-weight:700;border:none;background:var(--panel2);color:var(--sub);}
  .tabBtn.active{background:var(--w);color:#fff;box-shadow:0 8px 18px rgba(24,26,32,0.24);}
  .feelBtn{text-align:left;padding:11px 12px;border-radius:14px;border:1.5px solid transparent;}
  .primary{width:100%;padding:14px 0;border-radius:15px;background:var(--w);color:#fff;font-weight:800;font-size:15px;box-shadow:0 10px 22px rgba(24,26,32,0.28);}
  .lbl{font-size:11px;color:var(--faint);margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase;font-weight:600;}
  .mono{font-family:ui-monospace,monospace;}
  .row{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;}
</style>
</head>
<body>
<div id="root"></div>
<script>
"use strict";
var C={bg:"#FAFBFD",panel:"#FFFFFF",panel2:"#F4F5F9",line:"#ECEDF3",text:"#181A20",sub:"#6A6F7C",faint:"#A2A6B2",weight:"#2E9E6B",reps:"#2C7BC0",set:"#6A55C0",back:"#D2566B",hold:"#7A7F8C"};

var DEFAULTS=[
 {id:"ua1",day:"Upper A",name:"Barbell Bench Press",lo:5,hi:8,big:false},
 {id:"ua2",day:"Upper A",name:"Military Press (standing BB)",lo:5,hi:8,big:false},
 {id:"ua3",day:"Upper A",name:"Pull-up / Lat Pulldown",lo:6,hi:9,big:false},
 {id:"ua4",day:"Upper A",name:"Chest-Supported Row",lo:6,hi:9,big:false},
 {id:"ua5",day:"Upper A",name:"Cable Lateral Raise",lo:12,hi:15,big:false},
 {id:"ua6",day:"Upper A",name:"Triceps Pushdown",lo:8,hi:12,big:false},
 {id:"ua7",day:"Upper A",name:"Smith Machine Skullcrusher",lo:8,hi:10,big:false},
 {id:"ua8",day:"Upper A",name:"Barbell / DB Curl",lo:8,hi:12,big:false},
 {id:"la1",day:"Lower A",name:"Hack Squat or Belt Squat",lo:6,hi:9,big:false},
 {id:"la2",day:"Lower A",name:"Weighted Step-up",lo:8,hi:10,big:false},
 {id:"la3",day:"Lower A",name:"Lying Leg Curl",lo:8,hi:12,big:false},
 {id:"la4",day:"Lower A",name:"Leg Extension",lo:10,hi:15,big:false},
 {id:"la5",day:"Lower A",name:"Farmer's Carry",lo:30,hi:40,big:true,carry:true},
 {id:"la6",day:"Lower A",name:"Standing Calf Raise",lo:8,hi:12,big:false},
 {id:"ub1",day:"Upper B",name:"Incline DB Press",lo:6,hi:9,big:false},
 {id:"ub2",day:"Upper B",name:"Pec Deck / Cable Fly",lo:10,hi:15,big:false},
 {id:"ub3",day:"Upper B",name:"Seated DB Shoulder Press",lo:6,hi:9,big:false},
 {id:"ub4",day:"Upper B",name:"Wide-Grip Lat Pulldown",lo:8,hi:12,big:false},
 {id:"ub5",day:"Upper B",name:"DB Lateral Raise",lo:12,hi:15,big:false},
 {id:"ub6",day:"Upper B",name:"Overhead Triceps Extension",lo:10,hi:12,big:false},
 {id:"ub7",day:"Upper B",name:"Single-Arm Tricep Extension",lo:10,hi:12,big:false},
 {id:"ub8",day:"Upper B",name:"Incline DB Curl",lo:8,hi:12,big:false},
 {id:"lb1",day:"Lower B",name:"Romanian Deadlift",lo:6,hi:9,big:true},
 {id:"lb2",day:"Lower B",name:"Bulgarian Split Squat",lo:8,hi:12,big:false},
 {id:"lb3",day:"Lower B",name:"Seated Leg Curl",lo:8,hi:12,big:false},
 {id:"lb4",day:"Lower B",name:"Hip Thrust",lo:8,hi:12,big:true},
 {id:"lb5",day:"Lower B",name:"Seated Calf Raise",lo:10,hi:15,big:false}
];
var DAYS=["Upper A","Lower A","Upper B","Lower B"];
var FEELS=[{k:"easy",label:"Easy",hint:"3+ reps left in the tank"},{k:"solid",label:"Solid",hint:"hard but clean, 1-2 left"},{k:"hard",label:"Hard",hint:"all-out, hit the target"},{k:"grind",label:"Grind",hint:"ground to a halt / missed it"}];
var FEELPAL={easy:"#DCEBF8",solid:"#D9EFE2",hard:"#F6EFCF",grind:"#F8DEE2"};
var GREEN={bg:"#D9EFE2",ink:"#1F7A52"},BLUE={bg:"#DCEBF8",ink:"#1F6AA8"},LAV={bg:"#E6E0F8",ink:"#5A45A8"},PINK={bg:"#F8DEE2",ink:"#B0455A"},GREY={bg:"#ECEEF2",ink:"#5B6170"},YEL={bg:"#F7EFCF",ink:"#8A7320"};
var PAL={"START":YEL,"GO UP IN WEIGHT":GREEN,"GO HEAVIER":GREEN,"GO UP IN REPS":BLUE,"ADD DISTANCE":BLUE,"ADD A SET":LAV,"BACK OFF":PINK,"HOLD WEIGHT":PINK,"HOLD LOAD":PINK,"HOLD":GREY,"RECOVER":GREY};

function epley(w,r){return w*(1+r/30);}
function round(x,step){return Math.max(step,Math.round(x/step)*step);}
function increment(ex,feel,inc){var b=ex.big?inc*2:inc;if(feel==="easy")b*=2;if(feel==="grind")b=inc;return round(b,inc);}
function setsOf(log){if(log.sets)return log.sets;if(log.reps)return log.reps.map(function(r){return {w:log.weight,r:r};});return [];}
function setE1(s){return epley(s.w,s.r);}
function topSet(sets){var b=sets[0];for(var i=1;i<sets.length;i++){if(setE1(sets[i])>setE1(b))b=sets[i];}return b;}
function isStalled(rows){if(rows.length<3)return false;var l=rows.slice(-3);var e=l.map(function(g){return setE1(topSet(setsOf(g)));});return e[2]<=e[0];}

function recommend(ex,rows,inc,unit){
 if(!rows.length)return{v:"START",c:C.sub,head:"Log your first set",sub:null,detail:"Once you log a session, your exact next-session target shows up here."};
 var last=rows[rows.length-1],feel=last.feel;
 if(ex.carry){
  var dist=last.dist||ex.lo,w=last.weight;
  if(last.beat)return{v:"RECOVER",c:C.hold,icon:"\u21BB",head:"Repeat "+w+unit,sub:"for "+dist+"m \u00B7 low recovery",detail:"You flagged low recovery -- repeat the same carry and add load next time you're fresh."};
  if(feel==="grind")return{v:"HOLD LOAD",c:C.back,icon:"\u26A0",head:"Hold "+w+unit,sub:"for "+dist+"m",detail:"Grip or posture broke down. Own "+w+unit+" for "+dist+"m clean before adding anything."};
  if(feel==="easy")return{v:"GO HEAVIER",c:C.weight,icon:"\u2191",head:(w+inc*2)+unit,sub:"or +10m \u00B7 too light",detail:"That barely registered -- jump to "+(w+inc*2)+unit+", or keep the load and walk 10m farther."};
  if(feel==="hard")return{v:"ADD DISTANCE",c:C.reps,icon:"\u2192",head:(dist+5)+"m",sub:"hold "+w+unit+" \u00B7 earn it",detail:"Load felt heavy -- keep "+w+unit+" and push to "+(dist+5)+"m. Add load once distance feels easy."};
  return{v:"GO HEAVIER",c:C.weight,icon:"\u2191",head:(w+inc)+unit,sub:"or extend to "+(dist+10)+"m",detail:"Solid carry. Add "+inc+unit+" next session, or keep the load and extend to "+(dist+10)+"m."};
 }
 var sets=setsOf(last),best=topSet(sets),tw=best.w,tr=best.r;
 var topHit=tr>=ex.hi,bottomMiss=tr<ex.lo;
 if(last.beat)return{v:"RECOVER",c:C.hold,icon:"\u21BB",head:"Repeat "+tw+unit,sub:"top set \u00D7 "+tr+" \u00B7 low recovery",detail:"You flagged low recovery. Match your last sets and push the top set up next time you're fresh."};
 if(feel==="grind"&&bottomMiss){var under=ex.lo-tr;if(under>=2){var nw=round(tw*0.9,inc);return{v:"BACK OFF",c:C.back,icon:"\u26A0",head:nw+unit,sub:"top set \u00D7 "+ex.lo+" \u00B7 backed off",detail:"Your top set fell "+under+"+ reps short of "+ex.lo+". Reset the heavy set to "+nw+" and rebuild clean reps."};}return{v:"HOLD WEIGHT",c:C.back,icon:"\u26A0",head:tw+unit,sub:"top set \u00D7 "+ex.lo,detail:"Top set missed the bottom of the range. Repeat "+tw+" until you hit "+ex.lo+"+ on it."};}
 if(topHit){var add=increment(ex,feel,inc);return{v:"GO UP IN WEIGHT",c:C.weight,icon:"\u2191",head:(tw+add)+unit,sub:"top set \u00D7 "+ex.lo+" \u00B7 +"+add,detail:"Your top set hit "+ex.hi+". Add "+add+" to your heaviest set (next: "+(tw+add)+" for "+ex.lo+") and bring your other sets up in step."};}
 if(feel==="easy"){var add2=increment(ex,"easy",inc);return{v:"GO UP IN WEIGHT",c:C.weight,icon:"\u2191",head:(tw+add2)+unit,sub:"top set \u00B7 +"+add2,detail:"That was too light -- 3+ left in the tank. Push the top set to "+(tw+add2)+" and keep working the "+ex.lo+"-"+ex.hi+" range."};}
 if(isStalled(rows)){var nsets=sets.length;if(nsets<4)return{v:"ADD A SET",c:C.set,icon:"\u2261",head:(nsets+1)+" sets",sub:"top set est 1RM flat 3x",detail:"Your top-set strength has been flat 3 sessions. If sleep and soreness are good, add a set to push volume. If you're run down, hold instead."};return{v:"HOLD",c:C.hold,icon:"\u21BB",head:"Hold / deload",sub:"~10% lighter week",detail:"You're at 4 sets and stalled -- take a lighter week (~10% off) then rebuild, rather than adding volume."};}
 var target=Math.min(tr+1,ex.hi);
 return{v:"GO UP IN REPS",c:C.reps,icon:"\u21BB",head:tw+unit+" \u00D7 "+target,sub:"top set \u00B7 +1 rep",detail:"Keep "+tw+" on your top set and add a rep -- target "+target+". When it hits "+ex.hi+", the weight goes up."};
}

/* ---------- state + storage ---------- */
var KEY="po:data:v2";
function loadData(){try{var r=localStorage.getItem(KEY);return r?JSON.parse(r):null;}catch(e){return null;}}
function persist(){try{localStorage.setItem(KEY,JSON.stringify({logs:S.logs,custom:S.custom,overrides:S.overrides,days:S.days,unit:S.unit,inc:S.inc}));}catch(e){}}
var saved=loadData()||{};
var S={
 logs:saved.logs||[],custom:saved.custom||[],overrides:saved.overrides||{},unit:saved.unit||"lb",inc:saved.inc||(saved.unit==="kg"?2.5:5),
 days:saved.days||DAYS.slice(),day:"Upper A",exId:"ua1",tab:"plan",showHow:false,showSet:false,showAdd:false,editEx:null,
 feel:"solid",beat:false,flash:false,
 form:{sets:[{w:"",r:""},{w:"",r:""}],cw:"",dist:"30",trips:"3"},
 cForm:{name:"",lo:"8",hi:"12",big:false},
 eForm:{name:"",lo:"",hi:"",big:false}
};
function uid(){return (window.crypto&&crypto.randomUUID)?crypto.randomUUID():"id"+Date.now()+Math.random();}
function esc(s){return String(s).replace(/[&<>"']/g,function(c){return{"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c];});}
function exercises(){var list=[];DEFAULTS.forEach(function(e){var o=S.overrides[e.id];if(o&&o.deleted)return;list.push(o?Object.assign({},e,o):e);});S.custom.forEach(function(c){var o=S.overrides[c.id];if(o&&o.deleted)return;list.push(o?Object.assign({},c,o):c);});return list;}
function curEx(){var all=exercises();return all.filter(function(e){return e.id===S.exId;})[0]||all.filter(function(e){return e.day===S.day;})[0];}
function rowsFor(id){return S.logs.filter(function(l){return l.exId===id;}).sort(function(a,b){return a.t-b.t;});}

function miniChart(data,color){
 if(data.length<2)return '<div style="font-size:13px;color:'+C.faint+';padding:14px 0 18px">Log 2+ sessions to see your trend.</div>';
 var vals=data.map(function(d){return d.val;}),min=Math.min.apply(null,vals),max=Math.max.apply(null,vals),rng=(max-min)||1;
 var W=320,H=150,pad=22,pts=data.map(function(d,i){var x=pad+(i/(data.length-1))*(W-pad-8);var y=10+(1-(d.val-min)/rng)*(H-34);return [x,y];});
 var path=pts.map(function(p,i){return (i?"L":"M")+p[0].toFixed(1)+" "+p[1].toFixed(1);}).join(" ");
 var grid=[0,0.5,1].map(function(g){var y=10+g*(H-34);return '<line x1="'+pad+'" x2="'+(W-8)+'" y1="'+y+'" y2="'+y+'" stroke="'+C.line+'" stroke-dasharray="3 3"/>';}).join("");
 var dots=pts.map(function(p){return '<circle cx="'+p[0]+'" cy="'+p[1]+'" r="3" fill="'+color+'"/>';}).join("");
 return '<svg viewBox="0 0 '+W+' '+H+'" style="width:100%;height:'+H+'px;margin-bottom:6px">'+grid+'<text x="'+pad+'" y="'+(H-6)+'" fill="'+C.faint+'" font-size="11">'+esc(data[0].d)+'</text><text x="'+(W-8)+'" y="'+(H-6)+'" fill="'+C.faint+'" font-size="11" text-anchor="end">'+esc(data[data.length-1].d)+'</text><text x="4" y="16" fill="'+C.faint+'" font-size="11">'+max+'</text><text x="4" y="'+(H-26)+'" fill="'+C.faint+'" font-size="11">'+min+'</text><path d="'+path+'" fill="none" stroke="'+color+'" stroke-width="2.4" stroke-linejoin="round" stroke-linecap="round"/>'+dots+'</svg>';
}
function feelColor(f){return {easy:C.reps,solid:C.text,hard:C.weight,grind:C.back}[f]||C.sub;}
function shade(hex,p){var n=parseInt(hex.slice(1),16),r=(n>>16)&255,g=(n>>8)&255,b=n&255;r=Math.round(r*(1-p));g=Math.round(g*(1-p));b=Math.round(b*(1-p));return "#"+("000000"+((r<<16)+(g<<8)+b).toString(16)).slice(-6);}

function render(){
 var ex=curEx(),all=exercises(),dayEx=all.filter(function(e){return e.day===S.day;});
 var rows=rowsFor(ex&&ex.id),rec=ex?recommend(ex,rows,S.inc,S.unit):null,lastLog=rows[rows.length-1];
 var chartData=rows.map(function(l){return {d:new Date(l.t).toLocaleDateString(undefined,{month:"numeric",day:"numeric"}),val:(ex&&ex.carry)?l.weight:Math.round(setE1(topSet(setsOf(l))))};});

 var H='<div class="wrap">';
 H+='<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px"><div style="display:flex;align-items:center;gap:10px"><div style="width:34px;height:34px;border-radius:11px;background:'+C.text+';display:grid;place-items:center"><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#FFFFFF" stroke-width="2.4" stroke-linecap="round"><path d="M6.5 6v12M3.2 8.5v7M17.5 6v12M20.8 8.5v7M6.5 12h11"/></svg></div><div><div style="font-weight:800;letter-spacing:-.02em;font-size:24px">OVERLOAD</div></div></div><button class="iconBtn" data-act="toggleSet"><span style="font-size:18px;color:'+C.sub+'">\u2699</span></button></div>';

 if(S.showSet){
  H+='<div class="panel" style="padding:14px;margin-bottom:14px"><div class="row"><span style="font-size:13px;color:'+C.sub+'">Units</span><div style="display:flex;gap:6px">'+["lb","kg"].map(function(u){return '<button class="chip '+(S.unit===u?"active":"")+'" data-act="unit" data-val="'+u+'">'+u+'</button>';}).join("")+'</div></div><div class="row"><span style="font-size:13px;color:'+C.sub+'">Smallest plate jump</span><div style="display:flex;gap:6px">'+(S.unit==="kg"?[1.25,2.5,5]:[2.5,5,10]).map(function(n){return '<button class="chip '+(S.inc===n?"active":"")+'" data-act="inc" data-val="'+n+'">'+n+'</button>';}).join("")+'</div></div><div style="font-size:12px;color:'+C.faint+';margin-top:4px">Weight jumps round to this. Big lifts jump double.</div><div style="border-top:1px solid '+C.line+';margin:12px 0 10px"></div><div class="lbl">Days \u00B7 tap a name to rename</div>'+S.days.map(function(d,i){return '<div style="display:flex;gap:8px;margin-bottom:6px;align-items:center"><input data-field="dayName" data-idx="'+i+'" value="'+esc(d)+'" style="flex:1">'+(S.days.length>1?'<button class="iconBtn" data-act="rmDay" data-val="'+i+'"><span style="color:'+C.faint+';font-size:14px">\u2212</span></button>':"")+'</div>';}).join("")+'<button data-act="addDay" style="font-size:13px;color:'+C.faint+';padding:4px 0;display:flex;align-items:center;gap:6px">+ Add day</button><div style="font-size:12px;color:'+C.faint+';margin-top:6px">Renaming updates that day\u0027s exercises. Removing a day deletes its exercises.</div><div style="border-top:1px solid '+C.line+';margin:12px 0 10px"></div><div class="lbl">Backup \u00B7 '+S.logs.length+' sessions</div><div style="display:flex;gap:8px"><button data-act="export" style="flex:1;padding:9px 0;border-radius:9px;border:1px solid '+C.line+';background:'+C.panel2+';color:'+C.text+';font-size:13px;font-weight:700">Export backup</button><button data-act="import" style="flex:1;padding:9px 0;border-radius:9px;border:1px solid '+C.line+';background:'+C.panel2+';color:'+C.text+';font-size:13px;font-weight:700">Import backup</button></div><div style="font-size:12px;color:'+C.faint+';margin-top:8px">Export saves your full log as a file. Import merges a backup back in \u2014 nothing gets overwritten.</div></div>';
 }

 H+='<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(72px,1fr));gap:6px;margin-bottom:12px">'+S.days.map(function(d){return '<button class="dayBtn '+(S.day===d?"active":"")+'" data-act="pickDay" data-val="'+esc(d)+'">'+esc(d)+'</button>';}).join("")+'</div>';

 H+='<div class="panel" style="padding:6px;margin-bottom:14px">'+dayEx.map(function(e){return '<button class="exBtn '+(e.id===S.exId?"active":"")+'" data-act="selEx" data-val="'+e.id+'"><span>'+esc(e.name)+'</span><span class="exMeta">'+(e.carry?e.lo+"-"+e.hi+"m":e.lo+"-"+e.hi)+'</span></button>';}).join("");
 H+='<button data-act="toggleAdd" style="width:100%;padding:9px 12px;border-radius:9px;color:'+C.faint+';font-size:13px;display:flex;align-items:center;gap:6px">+ Add exercise to '+S.day+'</button>';
 if(S.showAdd){H+='<div style="padding:10px;border-top:1px solid '+C.line+';margin-top:4px"><input data-field="cname" placeholder="Exercise name" value="'+esc(S.cForm.name)+'" style="width:100%"><div style="display:flex;gap:8px;margin-top:8px;align-items:center"><input data-field="clo" inputmode="numeric" value="'+esc(S.cForm.lo)+'" style="width:56px"><span style="color:'+C.faint+'">to</span><input data-field="chi" inputmode="numeric" value="'+esc(S.cForm.hi)+'" style="width:56px"><span style="color:'+C.sub+';font-size:13px">target reps</span><button class="chip '+(S.cForm.big?"active":"")+'" data-act="cBig">big lift</button></div><button class="primary" data-act="addCustom" style="margin-top:10px">Add</button></div>';}
 H+='</div>';

 if(rec){
  var lastLine="";
  if(lastLog){if(lastLog.carry){lastLine="Last: "+lastLog.weight+S.unit+" \u00D7 "+lastLog.dist+"m \u00D7 "+lastLog.trips+" trips \u00B7 felt "+lastLog.feel+(lastLog.beat?" \u00B7 low recovery":"");}else{var ss=setsOf(lastLog);lastLine="Last: "+ss.map(function(s){return s.w+S.unit+"\u00D7"+s.r;}).join(", ")+" \u00B7 felt "+lastLog.feel+(lastLog.beat?" \u00B7 low recovery":"")+" \u00B7 top est 1RM "+Math.round(setE1(topSet(ss)))+S.unit;}}
  var pal=PAL[rec.v]||GREY;
  H+='<div style="padding:20px;margin-bottom:14px;border-radius:22px;background:'+pal.bg+';box-shadow:0 8px 22px rgba(24,26,32,0.06);color:#181A20"><div style="display:flex;align-items:center;gap:8px;margin-bottom:12px"><span style="font-size:16px;font-weight:700;color:'+pal.ink+'">'+(rec.icon||"\u26A1")+'</span><span style="font-size:12px;font-weight:800;letter-spacing:.12em;color:'+pal.ink+'">'+rec.v+'</span></div><div style="font-size:36px;font-weight:800;letter-spacing:-.03em;line-height:1.05;color:#181A20">'+esc(rec.head)+'</div>'+(rec.sub?'<div class="mono" style="font-size:13px;color:rgba(24,26,32,0.62);margin-top:5px">'+esc(rec.sub)+'</div>':"")+'<div style="font-size:13.5px;color:rgba(24,26,32,0.78);line-height:1.5;margin-top:10px">'+esc(rec.detail)+'</div>'+(lastLog?'<div class="mono" style="margin-top:12px;padding-top:12px;border-top:1px solid rgba(24,26,32,0.12);font-size:12px;color:rgba(24,26,32,0.55)">'+esc(lastLine)+'</div>':"")+'</div>';
 }

 H+='<div style="display:flex;gap:6px;margin-bottom:12px">'+[["plan","Log set"],["history","Progress"]].map(function(t){return '<button class="tabBtn '+(S.tab===t[0]?"active":"")+'" data-act="tab" data-val="'+t[0]+'">'+t[1]+'</button>';}).join("")+'</div>';

 if(S.tab==="plan"&&!ex){H+='<div class="panel" style="padding:20px;text-align:center;color:'+C.faint+';font-size:13px">No exercises in this day yet \u2014 use \u201cAdd exercise to '+esc(S.day)+'\u201d above to build it.</div>';}
 if(S.tab==="plan"&&ex){
  var editing=S.editEx===ex.id;
  H+='<div class="panel" style="padding:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px"><div style="font-size:13px;font-weight:700;color:'+C.sub+'">'+esc(ex?ex.name:"")+' <span style="color:'+C.faint+';font-weight:400">\u00B7 target '+(ex&&ex.carry?ex.lo+"-"+ex.hi+"m":ex?ex.lo+"-"+ex.hi+" reps":"")+'</span></div><button class="chip" data-act="'+(editing?"editCancel":"editOpen")+'">'+(editing?"Cancel":"Edit")+'</button></div>';

  if(editing){
   H+='<div style="border:1px solid '+C.weight+';border-radius:10px;padding:12px;background:'+C.panel2+'"><input data-field="efName" value="'+esc(S.eForm.name)+'" style="width:100%"><div style="display:flex;gap:10px;margin-top:10px;align-items:flex-end"><div><div class="lbl">Target '+(ex&&ex.carry?"dist low":"rep low")+'</div><input data-field="efLo" inputmode="numeric" value="'+esc(S.eForm.lo)+'" style="width:64px;text-align:center"></div><div><div class="lbl">Target '+(ex&&ex.carry?"dist high":"rep high")+'</div><input data-field="efHi" inputmode="numeric" value="'+esc(S.eForm.hi)+'" style="width:64px;text-align:center"></div><button class="chip '+(S.eForm.big?"active":"")+'" data-act="efBig" style="margin-bottom:4px">big lift</button></div><div style="display:flex;gap:8px;margin-top:14px"><button class="primary" data-act="editSave" style="flex:1">Save</button></div><button data-act="editDelete" style="width:100%;margin-top:8px;color:'+C.back+';font-size:13px;padding:8px;font-weight:700">Remove from split</button></div>';
  }else{
   if(ex&&ex.carry){
    H+='<div style="display:flex;gap:10px;margin-bottom:14px;flex-wrap:wrap"><div><div class="lbl">Load ('+S.unit+', total)</div><input data-field="cw" inputmode="decimal" placeholder="0" value="'+esc(S.form.cw)+'" style="width:90px;font-size:18px"></div><div><div class="lbl">Distance (m)</div><input data-field="dist" inputmode="numeric" value="'+esc(S.form.dist)+'" style="width:70px;font-size:18px"></div><div><div class="lbl">Trips</div><input data-field="trips" inputmode="numeric" value="'+esc(S.form.trips)+'" style="width:60px;font-size:18px"></div></div>';
   }else{
    H+='<div class="lbl">Weight \u00D7 reps per set</div>'+S.form.sets.map(function(s,i){return '<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px"><span style="font-size:12px;color:'+C.faint+';width:40px">Set '+(i+1)+'</span><input data-field="sw" data-idx="'+i+'" inputmode="decimal" placeholder="'+S.unit+'" value="'+esc(s.w)+'" style="width:78px;font-size:17px;text-align:center"><span style="color:'+C.faint+'">\u00D7</span><input data-field="sr" data-idx="'+i+'" inputmode="numeric" placeholder="reps" value="'+esc(s.r)+'" style="width:66px;font-size:17px;text-align:center">'+(S.form.sets.length>1&&i===S.form.sets.length-1?'<button class="iconBtn" data-act="rmSet"><span style="color:'+C.sub+';font-size:16px">\u2212</span></button>':"")+'</div>';}).join("")+'<button data-act="addSet" style="font-size:13px;color:'+C.faint+';padding:4px 0 12px;display:flex;align-items:center;gap:6px">+ Add set</button>';
   }
   H+='<div class="lbl">'+((ex&&ex.carry)?"How did the carry feel?":"How did the hardest set feel?")+'</div><div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-bottom:6px">'+FEELS.map(function(f){return '<button class="feelBtn" data-act="feel" data-val="'+f.k+'" style="background:'+FEELPAL[f.k]+';border:'+(S.feel===f.k?"2px solid "+C.text:"1.5px solid transparent")+'"><div style="font-weight:700;font-size:13.5px;color:'+C.text+'">'+f.label+'</div><div style="font-size:11px;color:rgba(24,26,32,0.55);margin-top:2px">'+f.hint+'</div></button>';}).join("")+'</div>';
   H+='<button data-act="toggleBeat" style="display:flex;align-items:center;gap:8px;width:100%;padding:10px 12px;margin-top:4px;border-radius:9px;border:1px solid '+(S.beat?C.back:C.line)+';background:'+(S.beat?"rgba(210,86,107,0.12)":C.panel2)+';color:'+(S.beat?C.back:C.sub)+';font-size:13px"><span style="width:16px;height:16px;border-radius:4px;border:1px solid '+(S.beat?C.back:C.faint)+';display:grid;place-items:center;color:'+C.back+';font-size:12px">'+(S.beat?"\u2713":"")+'</span>Under-recovered today (bad sleep / still sore)</button>';
   H+='<button class="primary" data-act="log" style="margin-top:14px;background:'+(S.flash?C.reps:C.weight)+'">'+(S.flash?"Logged \u2713":"Log this session")+'</button>';
  }
  H+='</div>';
 }

 if(S.tab==="history"){
  H+='<div class="panel" style="padding:16px"><div style="display:flex;align-items:center;gap:6px;margin-bottom:12px"><span style="color:'+C.weight+';font-size:15px">\u2197</span><span style="font-size:13px;font-weight:700">'+((ex&&ex.carry)?"Load trend":"Top-set 1RM trend")+' -- '+esc(ex?ex.name:"")+'</span></div>'+miniChart(chartData,C.text);
  H+='<div style="font-size:12px;font-weight:700;color:'+C.sub+';margin:10px 0 8px">Session log</div>';
  if(!rows.length)H+='<div style="font-size:13px;color:'+C.faint+'">No sessions yet.</div>';
  H+=rows.slice().reverse().map(function(l){var disp=l.carry?(l.weight+S.unit+" \u00D7 "+l.dist+"m \u00D7 "+l.trips):setsOf(l).map(function(s){return s.w+S.unit+"\u00D7"+s.r;}).join(", ");return '<div style="display:flex;justify-content:space-between;align-items:center;padding:9px 0;border-top:1px solid '+C.line+'"><div class="mono" style="font-size:13px;color:'+C.text+'">'+esc(disp)+'</div><div style="display:flex;align-items:center;gap:10px"><span style="font-size:11px;color:'+feelColor(l.feel)+';text-transform:uppercase;letter-spacing:.08em">'+l.feel+'</span><span style="font-size:11px;color:'+C.faint+'">'+new Date(l.t).toLocaleDateString(undefined,{month:"short",day:"numeric"})+'</span><button class="iconBtn" style="padding:4px" data-act="del" data-val="'+l.id+'"><span style="color:'+C.faint+';font-size:13px">\u2212</span></button></div></div>';}).join("");
  H+='</div>';
 }

 H+='<button data-act="toggleHow" style="width:100%;margin-top:14px;padding:12px 14px;border-radius:12px;border:1px solid '+C.line+';background:'+C.panel+';color:'+C.sub+';font-size:13px;font-weight:600;display:flex;justify-content:space-between;align-items:center">How the recommendations work <span style="font-size:16px;display:inline-block;transform:'+(S.showHow?"rotate(180deg)":"none")+'">\u2304</span></button>';
 if(S.showHow){
  function lever(c,ch,t,b){return '<div style="display:flex;gap:11px;margin-bottom:14px"><div style="width:26px;height:26px;border-radius:7px;background:'+c+'1f;display:grid;place-items:center;flex-shrink:0;color:'+c+';font-size:15px;font-weight:700">'+ch+'</div><div><div style="font-weight:700;font-size:13.5px;color:'+c+';margin-bottom:2px">'+t+'</div><div style="font-size:12.5px;color:'+C.sub+';line-height:1.5">'+b+'</div></div></div>';}
  H+='<div class="panel" style="padding:16px;margin-top:8px"><div style="font-size:12px;color:'+C.faint+';margin-bottom:12px;line-height:1.5">Recommendations track your <b style="color:'+C.text+'">top set</b> -- the heaviest set by estimated 1RM -- so they work whether you do straight sets or different weights each set.</div>'+lever(C.reps,"\u21BB","Reps first","Top set below the range top? Add a rep, same weight. Climb reps before load.")+lever(C.weight,"\u2191","Then weight","Top set hits the range top (or felt easy)? Load goes up on the heavy set, then drop back to the bottom of the range.")+lever(C.set,"\u2261","Sets when stalled","Top-set 1RM flat 3 sessions and recovering well? Add a set (capped at 4) to break the plateau.")+lever(C.back,"\u26A0","Back off when needed","Ground out below the range, hold or drop ~10%. Flag low recovery and it says repeat, not push.")+lever(C.reps,"\u2192","Carries differ","Carries log load, distance, and trips, and progress by weight or distance.")+'</div>';
 }
 H+='<div style="text-align:center;font-size:11px;color:'+C.faint+';margin-top:20px">Saves to this device automatically.</div></div>';
 root.innerHTML=H;
}

function setFirstExForDay(){var f=exercises().filter(function(e){return e.day===S.day;})[0];if(f)S.exId=f.id;else S.exId=null;}
function renameDay(idx,name){name=(name||"").trim();var old=S.days[idx];if(!name||name===old)return;if(S.days.indexOf(name)>=0){render();return;}DEFAULTS.forEach(function(e){var eff=(S.overrides[e.id]&&S.overrides[e.id].day)||e.day;if(eff===old)S.overrides[e.id]=Object.assign({},S.overrides[e.id],{day:name});});S.custom.forEach(function(c){if(((S.overrides[c.id]&&S.overrides[c.id].day)||c.day)===old)S.overrides[c.id]=Object.assign({},S.overrides[c.id],{day:name});});S.days[idx]=name;if(S.day===old)S.day=name;persist();render();}

function onClick(e){
 var el=e.target.closest("[data-act]");if(!el)return;
 var act=el.getAttribute("data-act"),val=el.getAttribute("data-val"),ex=curEx();
 if(act==="toggleSet")S.showSet=!S.showSet;
 else if(act==="toggleAdd")S.showAdd=!S.showAdd;
 else if(act==="toggleHow")S.showHow=!S.showHow;
 else if(act==="pickDay"){S.day=val;setFirstExForDay();S.showSet=false;S.editEx=null;}
 else if(act==="selEx"){S.exId=val;S.editEx=null;}
 else if(act==="tab")S.tab=val;
 else if(act==="feel")S.feel=val;
 else if(act==="toggleBeat")S.beat=!S.beat;
 else if(act==="addSet"){var ls=S.form.sets[S.form.sets.length-1];S.form.sets.push({w:ls?ls.w:"",r:""});}
 else if(act==="rmSet"){if(S.form.sets.length>1)S.form.sets.pop();}
 else if(act==="unit"){S.unit=val;S.inc=val==="kg"?2.5:5;persist();}
 else if(act==="inc"){S.inc=parseFloat(val);persist();}
 else if(act==="cBig")S.cForm.big=!S.cForm.big;
 else if(act==="addCustom"){if(!S.cForm.name.trim())return;var id="c"+uid().slice(0,6);S.custom.push({id:id,day:S.day,name:S.cForm.name.trim(),lo:parseInt(S.cForm.lo)||8,hi:parseInt(S.cForm.hi)||12,big:S.cForm.big});S.cForm={name:"",lo:"8",hi:"12",big:false};S.showAdd=false;S.exId=id;persist();}
 else if(act==="editOpen"){S.editEx=ex.id;S.eForm={name:ex.name,lo:String(ex.lo),hi:String(ex.hi),big:!!ex.big};}
 else if(act==="editCancel")S.editEx=null;
 else if(act==="efBig")S.eForm.big=!S.eForm.big;
 else if(act==="editSave"){var lo=parseInt(S.eForm.lo)||ex.lo,hi=parseInt(S.eForm.hi)||ex.hi;if(hi<lo){var tmp=lo;lo=hi;hi=tmp;}S.overrides[ex.id]=Object.assign({},S.overrides[ex.id],{name:(S.eForm.name.trim()||ex.name),lo:lo,hi:hi,big:S.eForm.big});S.editEx=null;persist();}
 else if(act==="editDelete"){S.overrides[ex.id]=Object.assign({},S.overrides[ex.id],{deleted:true});S.editEx=null;setFirstExForDay();persist();}
 else if(act==="addDay"){var base="New Day",nm=base,k=2;while(S.days.indexOf(nm)>=0){nm=base+" "+k;k++;}S.days.push(nm);S.day=nm;S.exId=null;S.showAdd=false;persist();}
 else if(act==="rmDay"){var di=parseInt(val,10),dn=S.days[di];if(S.days.length<=1)return;if(!confirm("Remove '"+dn+"' and its exercises?"))return;exercises().forEach(function(e){if(e.day===dn)S.overrides[e.id]=Object.assign({},S.overrides[e.id],{deleted:true});});S.days.splice(di,1);if(S.day===dn){S.day=S.days[0];setFirstExForDay();}persist();}
 else if(act==="del"){S.logs=S.logs.filter(function(x){return x.id!==val;});persist();}
 else if(act==="export"){doExport();return;}
 else if(act==="import"){fileInput.click();return;}
 else if(act==="log"){doLog();return;}
 render();
}
function doLog(){
 var ex=curEx(),i;if(!ex)return;
 if(ex.carry){var weight=parseFloat(S.form.cw),dist=parseInt(S.form.dist,10),trips=parseInt(S.form.trips,10);if(!weight||weight<=0||!dist||!trips)return;S.logs.push({id:uid(),exId:ex.id,t:Date.now(),weight:weight,dist:dist,trips:trips,feel:S.feel,beat:S.beat,carry:true});}
 else{var sets=[];for(i=0;i<S.form.sets.length;i++){var w=parseFloat(S.form.sets[i].w),r=parseInt(S.form.sets[i].r,10);if(w>0&&r>0)sets.push({w:w,r:r});}if(!sets.length)return;S.logs.push({id:uid(),exId:ex.id,t:Date.now(),sets:sets,feel:S.feel,beat:S.beat});S.form.sets=S.form.sets.map(function(s){return {w:s.w,r:""};});}
 persist();S.beat=false;S.flash=true;render();setTimeout(function(){S.flash=false;render();},1400);
}
function doExport(){try{var data=JSON.stringify({app:"overload",exported:new Date().toISOString(),logs:S.logs,custom:S.custom,overrides:S.overrides,unit:S.unit,inc:S.inc},null,2);var blob=new Blob([data],{type:"application/json"});var url=URL.createObjectURL(blob);var a=document.createElement("a");a.href=url;a.download="overload-backup-"+new Date().toISOString().slice(0,10)+".json";document.body.appendChild(a);a.click();a.remove();setTimeout(function(){URL.revokeObjectURL(url);},2000);}catch(e){alert("Export isn't supported in this browser.");}}
function doImport(file){var reader=new FileReader();reader.onload=function(){try{var d=JSON.parse(reader.result);if(!d||!Array.isArray(d.logs))throw 0;var seen={},merged=[];S.logs.concat(d.logs).forEach(function(l){if(l&&l.id&&!seen[l.id]){seen[l.id]=1;merged.push(l);}});S.logs=merged;if(Array.isArray(d.custom)){var cs={},cm=[];S.custom.concat(d.custom).forEach(function(c){if(c&&c.id&&!cs[c.id]){cs[c.id]=1;cm.push(c);}});S.custom=cm;}if(d.overrides)S.overrides=Object.assign({},S.overrides,d.overrides);if(d.unit)S.unit=d.unit;if(d.inc)S.inc=d.inc;persist();render();alert("Backup imported \u2014 "+S.logs.length+" sessions total.");}catch(e){alert("Couldn't read that file. Make sure it's an Overload backup .json.");}};reader.readAsText(file);}
var fileInput=document.createElement("input");fileInput.type="file";fileInput.accept="application/json,.json";fileInput.style.display="none";fileInput.addEventListener("change",function(e){var f=e.target.files&&e.target.files[0];if(f)doImport(f);fileInput.value="";});document.body.appendChild(fileInput);
function onInput(e){var el=e.target,f=el.getAttribute("data-field");if(!f)return;var idx=el.getAttribute("data-idx");
 if(f==="sw")S.form.sets[parseInt(idx,10)].w=el.value;
 else if(f==="sr")S.form.sets[parseInt(idx,10)].r=el.value;
 else if(f==="cw")S.form.cw=el.value;
 else if(f==="dist")S.form.dist=el.value;
 else if(f==="trips")S.form.trips=el.value;
 else if(f==="cname")S.cForm.name=el.value;
 else if(f==="clo")S.cForm.lo=el.value;
 else if(f==="chi")S.cForm.hi=el.value;
 else if(f==="efName")S.eForm.name=el.value;
 else if(f==="efLo")S.eForm.lo=el.value;
 else if(f==="efHi")S.eForm.hi=el.value;
}
function onChange(e){var el=e.target;if(el.getAttribute&&el.getAttribute("data-field")==="dayName"){renameDay(parseInt(el.getAttribute("data-idx"),10),el.value);}}
var root=document.getElementById("root");
if(S.days.indexOf(S.day)<0)S.day=S.days[0]||"";
setFirstExForDay();
root.addEventListener("click",onClick);
root.addEventListener("input",onInput);
root.addEventListener("change",onChange);
render();
</script>
</body>
